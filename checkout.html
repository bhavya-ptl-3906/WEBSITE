<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | DesiFusion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <nav>
        <div class="logo">Desi<span>Fusion</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Back to Cart</a>
        </div>
    </nav>

    <main class="checkout-wrapper animate-in">
        <div class="checkout-layout">
            
            <div class="checkout-form-area">
                <form action="index.html"> <div class="form-section">
                        <h2>Contact Information</h2>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="you@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" placeholder="+1 (555) 000-0000">
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Shipping Address</h2>
                        <div class="input-row">
                            <div class="input-group">
                                <label>First Name</label>
                                <input type="text" required>
                            </div>
                            <div class="input-group">
                                <label>Last Name</label>
                                <input type="text" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Address</label>
                            <input type="text" placeholder="Street address or P.O. Box" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>City</label>
                                <input type="text" required>
                            </div>
                            <div class="input-group">
                                <label>Postal Code</label>
                                <input type="text" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Payment Details</h2>
                        <div class="input-group">
                            <label>Card Number</label>
                            <input type="text" placeholder="0000 0000 0000 0000" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>Expiration (MM/YY)</label>
                                <input type="text" placeholder="MM/YY" required>
                            </div>
                            <div class="input-group">
                                <label>CVC</label>
                                <input type="text" placeholder="123" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-glow" style="width: 100%; padding: 18px; font-size: 1.2rem;">Place Order Now</button>
                </form>
            </div>

            <div class="checkout-sidebar">
                <div class="mini-summary">
                    <h3 style="margin-bottom: 20px;">Order Summary</h3>
                    
                    <div class="mini-item">
                        <img src="https://via.placeholder.com/50/2a2a35/ffffff?text=W" alt="Watch">
                        <div class="mini-item-info">Quantum Smart Watch Pro <br><span style="color: var(--text-muted)">Qty: 1</span></div>
                        <div>$299.00</div>
                    </div>
                    
                    <div class="mini-item">
                        <img src="https://via.placeholder.com/50/2a2a35/ffffff?text=E" alt="Earbuds">
                        <div class="mini-item-info">Sonic Earbuds <br><span style="color: var(--text-muted)">Qty: 1</span></div>
                        <div>$149.00</div>
                    </div>

                    <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                        <div style="display: flex; justify-content: space-between; color: var(--text-muted);">
                            <span>Subtotal</span><span>$448.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; color: var(--text-muted); margin-top: 10px;">
                            <span>Taxes & Shipping</span><span>$35.84</span>
                        </div>
                        <div class="total-row">
                            <span>Total</span><span>$483.84</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 DesiFusion Tech E-Commerce.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
