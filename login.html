<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | DesiFusion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav>
        <div class="logo">Desi<span>Fusion</span></div>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div id="custom-alert"></div>

    <main class="auth-container">
        <div class="auth-card animate-in">
            <div class="auth-tabs">
                <div class="tab active" onclick="switchTab('login')">Sign In</div>
                <div class="tab" onclick="switchTab('register')">Sign Up</div>
            </div>

            <div id="login-form" class="form-box active">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your account.</p>
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="email@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                    <button type="submit" class="btn btn-glow" style="width: 100%;">Sign In</button>
                </form>
            </div>

            <div id="register-form" class="form-box">
                <h2>Create Account</h2>
                <p>Join Nexus and start your tech journey.</p>
                <form onsubmit="handleAuth(event, 'register')">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" placeholder="Name" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" placeholder="email@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="reg-pass" placeholder="Min. 8 characters" required>
                    </div>
                    <button type="submit" class="btn btn-glow" style="width: 100%;">Create Account</button>
                </form>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
