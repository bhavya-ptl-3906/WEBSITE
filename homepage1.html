<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create/Activate Account</title>
    <style>
        body{
            background-color: aqua;
        }
        .box{
            height: 1500px;
            width: 990px;
            background-color: rgb(83, 109, 50);
            border-radius: 15px;
            margin: 0px 0px 0px 248px;
        }
        h2{
            text-align: center;
            color: white;
            padding-top: 20px;
            border-color: white;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 56px;
        }
        input{
            margin: 20px 0px 0px 0px;
            height: 25px;
            width: 250px;
            
        }
        #num{
            width: 195px;
        }
        .firstname, .middlename, .lastname, .email, .mobile{
            color: white;
            font-size: large;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            margin: 0px 0px 0px 0px;
        }
        select{
            height: 25px;
            width: 55px;
            margin: 0px 0px 0px 0px;
        }
        .box1{
            height: 85px;
            width: 270px;
            background-color: aqua;
            margin: 0px 0px 0px 40px;
            
        }
        .box2{
            height: 85px;
            width: 270px;
            background-color: aqua;
            margin: -85px 0px 0px 360px;
            
        }
        .box3{
            height: 85px;
            width: 270px;
            background-color: aqua;
            margin: -85px 0px 0px 680px;
            
        }
        .box4{
            height: 85px;
            width: 270px;
            background-color: aqua;
            margin: 40px 0px 0px 40px;
            
        }
        .box5{
            height: 85px;
            width: 270px;
            background-color: aqua;
            margin: -85px 0px 0px 360px;
            
        }
    </style>
</head>
<body>
    <form>
    <div class="box">
        <h2>Create New Account<hr color="black"></h2>
        <div class="box1">
            <p class="firstname">Enter your First Name:</p><input type="text" name="Name" id="fname"></input>
        </div>
        <div class="box2">
            <p class="middlename">Enter your Middle Name:</p><input type="text" name="Name" id="mname"></input>
        </div>
        <div class="box3">
            <p class="lastname">Enter your Last Name:</p><input type="text" name="Name" id="lname"></input>
        </div>
        <div class="box4">
            <p class="email">Enter your E-mail Address:</p><input type="email" name="email" id="email"></input>
        </div>
        <div class="box5">
            <p class="mobile">Enter your Contact Number:</p>
            <select>
                <option value="1" selected>+91</option>
                <option value="2">+1</option>
                <option value="3">+404</option>
                <option value="4">+132</option>
            </select>
            <input type="text" name="number" id="num"></input>
        </div>
    </div>
    </form>
</body>
</html>
